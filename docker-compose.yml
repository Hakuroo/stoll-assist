services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: stoll
      POSTGRES_PASSWORD: stoll
      POSTGRES_DB: stoll_assist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stoll -d stoll_assist"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./services/api
      target: production
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./services/api
      target: production
    env_file:
      - path: .env
        required: false
    volumes:
      - ./services/api:/app
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -u -m app.worker

  test:
    build:
      context: ./services/api
      target: test
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://stoll:stoll@postgres:5432/stoll_assist
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_QUEUE_NAME: stoll:test:webhooks
      META_VERIFY_TOKEN: test-token
      META_APP_SECRET: replace-me
      META_ACCESS_TOKEN: not-used-in-tests
      META_PHONE_NUMBER_ID: test-phone-number-id
      META_API_VERSION: v99.0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-used-in-tests}
      OPENAI_GENERATION_MODEL: ${OPENAI_GENERATION_MODEL:-gpt-5.4-mini}
      LLM_DRAFTING_ENABLED: "false"
      LLM_DRAFTING_PROVIDER: openai
      LLM_DRAFTING_LEASE_SECONDS: "60"
      RUN_LIVE_OPENAI_TEST: ${RUN_LIVE_OPENAI_TEST:-0}
      KNOWLEDGE_CONFIG_PATH: /app/config/stoll/knowledge
      PGHOST: postgres
      PGUSER: stoll
      PGPASSWORD: stoll
      PGDATABASE: stoll_assist
    volumes:
      - ./config:/app/config:ro
      - ./infra/postgres/migrations:/app/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started


volumes:
  postgres_data:
  redis_data:
  minio_data:
